<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gestor de Tareas</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2314171C'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='%235B8DEF' font-family='monospace'%3E%3E_%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #14171C;
    --surface: #1C2129;
    --border: #2A3038;
    --text-primary: #E8EAED;
    --text-secondary: #8B92A0;
    --accent: #5B8DEF;
    --completed: #14B8A6;
    --priority-alta: #F0654B;
    --priority-media: #F5B84D;
    --priority-baja: #6B7280;

    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Inter', sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-sans);
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  a {
    color: var(--accent);
  }

  *:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* Header */
  header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }

  header h1 {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 20px;
    margin: 0;
    color: var(--text-primary);
  }

  @keyframes parpadeo {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  #cursor {
    animation: parpadeo 1s step-start infinite;
  }

  /* Formulario de nueva tarea */
  .form-tarea {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  .form-tarea input[type="text"] {
    font-family: var(--font-mono);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    padding: 10px 12px;
    flex: 1;
    min-width: 160px;
  }

  .form-tarea input[type="text"]::placeholder {
    color: var(--text-secondary);
  }

  .form-tarea input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91, 141, 239, 0.2);
  }

  select#prioridad {
    font-family: var(--font-mono);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    padding: 10px 12px;
  }

  .btn-agregar {
    font-family: var(--font-mono);
    font-weight: 600;
    background: var(--accent);
    color: #0B1015;
    border: none;
    border-radius: 6px;
    padding: 0 18px;
    cursor: pointer;
    font-size: 18px;
  }

  /* Barra de filtros */
  .filtros {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
  }

  .filtros input[type="text"] {
    font-family: var(--font-mono);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    padding: 8px 12px;
    flex: 1;
    min-width: 140px;
  }

  .filtros input[type="text"]::placeholder {
    color: var(--text-secondary);
  }

  .chip {
    font-family: var(--font-mono);
    font-size: 12px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-secondary);
    padding: 6px 12px;
    cursor: pointer;
  }

  .chip[data-prioridad="alta"].activo {
    border-color: var(--priority-alta);
    color: var(--priority-alta);
  }

  .chip[data-prioridad="media"].activo {
    border-color: var(--priority-media);
    color: var(--priority-media);
  }

  .chip[data-prioridad="baja"].activo {
    border-color: var(--priority-baja);
    color: var(--priority-baja);
  }

  /* Lista de tareas */
  ul#lista-tareas {
    list-style: none;
    padding: 0;
    margin: 0 0 20px;
  }

  li.tarea {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 6px;
    border-bottom: 1px solid var(--border);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  li.tarea.saliendo {
    opacity: 0;
    transform: translateX(-16px);
  }

  .estado {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-secondary);
    width: 20px;
    text-align: center;
    padding: 0;
  }

  li.tarea.completada .estado {
    color: var(--completed);
  }

  .titulo {
    font-family: var(--font-sans);
    flex: 1;
    transition: opacity 0.3s ease;
  }

  li.tarea.completada .titulo {
    text-decoration: line-through;
    opacity: 0.5;
  }

  .badge-prioridad {
    font-family: var(--font-mono);
    text-transform: uppercase;
    font-size: 11px;
    border-radius: 999px;
    padding: 2px 10px;
  }

  .badge-prioridad[data-prioridad="alta"] {
    background: rgba(240, 101, 75, 0.15);
    color: var(--priority-alta);
  }

  .badge-prioridad[data-prioridad="media"] {
    background: rgba(245, 184, 77, 0.15);
    color: var(--priority-media);
  }

  .badge-prioridad[data-prioridad="baja"] {
    background: rgba(107, 114, 128, 0.15);
    color: var(--priority-baja);
  }

  .eliminar {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
    visibility: hidden;
  }

  li.tarea:hover .eliminar {
    visibility: visible;
  }

  .eliminar:hover {
    color: var(--priority-alta);
  }

  /* Reporte */
  .reporte {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-secondary);
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .reporte .completadas {
    color: var(--completed);
  }

  .reporte .pendientes {
    color: var(--text-secondary);
  }

  /* Estado vacío */
  .vacio {
    font-family: var(--font-mono);
    color: var(--text-secondary);
    text-align: center;
    padding: 32px 0;
  }

  @media (max-width: 480px) {
    .form-tarea,
    .filtros {
      flex-direction: column;
      align-items: stretch;
    }
  }
</style>
</head>
<body>
  <header>
    <h1>gestor-tareas $ <span id="cursor">_</span></h1>
  </header>

  <form class="form-tarea" id="form-tarea">
    <input type="text" id="titulo" placeholder="&gt; nueva tarea..." required />
    <input type="text" id="descripcion" placeholder="descripción (opcional)" />
    <select id="prioridad">
      <option value="media">media</option>
      <option value="alta">alta</option>
      <option value="baja">baja</option>
    </select>
    <button type="submit" class="btn-agregar" aria-label="Agregar tarea">+</button>
  </form>

  <div class="filtros">
    <input type="text" id="buscar" placeholder="grep..." />
    <button type="button" class="chip" data-prioridad="alta">Alta</button>
    <button type="button" class="chip" data-prioridad="media">Media</button>
    <button type="button" class="chip" data-prioridad="baja">Baja</button>
  </div>

  <ul id="lista-tareas"></ul>

  <p class="vacio" id="estado-vacio" hidden>$ no hay tareas — agrega la primera arriba</p>

  <div class="reporte">
    ── reporte ──────────────────────<br />
    <span class="completadas" id="reporte-completadas">✓ 0 completadas</span>
    &nbsp;&nbsp;&nbsp;
    <span class="pendientes" id="reporte-pendientes">○ 0 pendientes</span>
  </div>

  <script>
    const lista = document.getElementById('lista-tareas');
    const form = document.getElementById('form-tarea');
    const buscarInput = document.getElementById('buscar');
    const estadoVacio = document.getElementById('estado-vacio');
    const chips = document.querySelectorAll('.chip');
    const reporteCompletadas = document.getElementById('reporte-completadas');
    const reportePendientes = document.getElementById('reporte-pendientes');

    let prioridadActiva = null;

    async function cargarTareas() {
      const query = buscarInput.value;
      const url = query ? `/api/tareas?buscar=${encodeURIComponent(query)}` : '/api/tareas';
      const res = await fetch(url);
      let tareas = await res.json();

      if (prioridadActiva) {
        tareas = tareas.filter((tarea) => tarea.prioridad === prioridadActiva);
      }

      lista.innerHTML = '';
      estadoVacio.hidden = tareas.length > 0;

      tareas.forEach((tarea) => {
        const li = document.createElement('li');
        li.className = 'tarea';
        li.dataset.id = tarea.id;
        if (tarea.completada) li.classList.add('completada');
        li.innerHTML = `
          <button class="estado" data-id="${tarea.id}" aria-label="Cambiar estado">${tarea.completada ? '✓' : '○'}</button>
          <span class="titulo">${tarea.titulo}</span>
          <span class="badge-prioridad" data-prioridad="${tarea.prioridad || 'media'}">${tarea.prioridad || 'media'}</span>
          <button class="eliminar" data-id="${tarea.id}" aria-label="Eliminar tarea">✕</button>
        `;
        lista.appendChild(li);
      });
    }

    async function cargarReporte() {
      const res = await fetch('/api/tareas/reporte');
      const { completadas, pendientes } = await res.json();
      reporteCompletadas.textContent = `✓ ${completadas} completadas`;
      reportePendientes.textContent = `○ ${pendientes} pendientes`;
    }

    async function refrescar() {
      await cargarTareas();
      await cargarReporte();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const titulo = document.getElementById('titulo').value;
      const descripcion = document.getElementById('descripcion').value;
      const prioridad = document.getElementById('prioridad').value;
      await fetch('/api/tareas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ titulo, descripcion, prioridad }),
      });
      form.reset();
      refrescar();
    });

    lista.addEventListener('click', async (e) => {
      if (e.target.classList.contains('estado')) {
        const id = e.target.dataset.id;
        const completar = e.target.textContent.trim() !== '✓';
        await fetch(`/api/tareas/${id}/completar`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ completada: completar }),
        });
        refrescar();
      }

      if (e.target.classList.contains('eliminar')) {
        const id = e.target.dataset.id;
        const li = e.target.closest('li.tarea');
        li.classList.add('saliendo');
        setTimeout(async () => {
          await fetch(`/api/tareas/${id}`, { method: 'DELETE' });
          refrescar();
        }, 250);
      }
    });

    buscarInput.addEventListener('input', refrescar);

    chips.forEach((chip) => {
      chip.addEventListener('click', () => {
        const valor = chip.dataset.prioridad;
        if (prioridadActiva === valor) {
          prioridadActiva = null;
          chip.classList.remove('activo');
        } else {
          prioridadActiva = valor;
          chips.forEach((c) => c.classList.remove('activo'));
          chip.classList.add('activo');
        }
        cargarTareas();
      });
    });

    refrescar();
  </script>
</body>
</html>
