<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gestor de Tareas</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2314171C'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='%235B8DEF' font-family='monospace'%3E%3E_%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #14171C;
    --surface: #1C2129;
    --border: #2A3038;
    --text-primary: #E8EAED;
    --text-secondary: #8B92A0;
    --accent: #5B8DEF;
    --completed: #14B8A6;
    --priority-alta: #F0654B;
    --priority-media: #F5B84D;
    --priority-baja: #6B7280;

    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Inter', sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-sans);
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  a {
    color: var(--accent);
  }

  *:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>
<body>
  <p style="font-family: var(--font-mono); color: var(--text-secondary);">Rediseño en construcción — paso 1/3 (paleta y tipografía base).</p>
</body>
</html>
